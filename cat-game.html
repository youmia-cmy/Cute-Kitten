<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --purple-deep: #c9a0ff; --purple-mid: #a97edb;
  --purple-light: rgba(160,130,210,0.35); --pink-hot: #ff7eb3;
  --pink-soft: #ffb3d9; --blue-soft: #8eb8e8;
  --gold-star: #ffd97a; --bg-cream: #0c0a14;
  --text-dark: #ede4ff; --text-mid: #b8a0d8; --text-light: #8070a0;
  --card-bg: rgba(20,16,35,0.75);
  --glow-pink: rgba(255,126,179,0.35); --glow-purple: rgba(160,120,220,0.35);
}
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: 'Zen Maru Gothic', 'Quicksand', sans-serif;
  background: var(--bg-cream); color: var(--text-dark);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse at 15% 15%, rgba(120,60,180,0.25) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 20%, rgba(60,90,180,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 75%, rgba(180,60,120,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 55%, rgba(140,50,160,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 25% 60%, rgba(80,60,200,0.12) 0%, transparent 50%),
    linear-gradient(160deg, #0c0a14 0%, #12101e 25%, #140e1e 50%, #100e1a 75%, #0c0a14 100%);
  -webkit-font-smoothing: antialiased;
}
#topBar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; background: rgba(12,10,20,0.92);
  backdrop-filter: blur(8px); border-bottom: 1px solid rgba(160,130,210,0.15);
}
.top-left { display: flex; align-items: center; gap: 12px; }
.back-btn {
  display: flex; align-items: center; gap: 6px; padding: 6px 16px;
  border-radius: 50px; border: 1.5px solid rgba(160,130,210,0.25);
  background: rgba(20,16,35,0.6); color: var(--purple-mid);
  font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.82rem;
  cursor: pointer; transition: all 0.25s; text-decoration: none;
}
.back-btn:hover { border-color: var(--pink-hot); color: var(--pink-hot);
  background: rgba(255,126,179,0.1); transform: scale(1.05); }
.game-title {
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: 1.1rem; color: var(--purple-deep);
}
.game-title span { color: var(--pink-hot); }
.top-right { display: flex; align-items: center; gap: 14px;
  font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 0.85rem; }
.stat { color: var(--text-mid); }
.stat b { color: var(--gold-star); }
#gameWrapper {
  position: relative; display: flex; align-items: center; justify-content: center;
  margin-top: 56px; width: 100%; flex: 1;
}
canvas#gameCanvas {
  display: block; border-radius: 16px;
  box-shadow: 0 0 40px rgba(160,120,220,0.15), 0 0 80px rgba(255,126,179,0.08);
  border: 1.5px solid rgba(160,130,210,0.18);
  background: rgba(10,8,18,0.85); touch-action: none;
}
/* Overlay screens */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(12,10,20,0.92); backdrop-filter: blur(12px);
}
.overlay.hidden { display: none; }
.overlay h2 {
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: clamp(1.4rem, 4vw, 2rem); color: var(--purple-deep);
  margin-bottom: 12px; text-align: center;
}
.overlay h2 span { color: var(--pink-hot); }
.overlay p {
  color: var(--text-mid); font-size: 0.95rem; margin-bottom: 24px;
  text-align: center; max-width: 360px; line-height: 1.7;
}
.overlay .btn-play {
  padding: 14px 36px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--pink-hot), var(--purple-mid));
  color: #fff; font-family: 'Quicksand', sans-serif; font-weight: 700;
  font-size: 1rem; cursor: pointer; position: relative; overflow: hidden;
  box-shadow: 0 4px 20px var(--glow-pink);
  transition: transform 0.2s, box-shadow 0.3s;
}
.overlay .btn-play:hover { transform: translateY(-2px) scale(1.04);
  box-shadow: 0 8px 32px var(--glow-pink); }
.overlay .btn-play:active { transform: scale(0.97); }
.overlay .btn-secondary {
  margin-top: 12px; padding: 10px 28px; border-radius: 50px;
  border: 1.5px solid var(--purple-light); background: transparent;
  color: var(--purple-mid); font-family: 'Quicksand', sans-serif;
  font-weight: 700; font-size: 0.9rem; cursor: pointer;
  transition: all 0.25s;
}
.overlay .btn-secondary:hover { border-color: var(--pink-hot); color: var(--pink-hot); }
.powerup-legend {
  display: flex; gap: 20px; margin-bottom: 20px;
  font-size: 0.82rem; color: var(--text-light);
}
.powerup-legend div { display: flex; align-items: center; gap: 6px; }
.powerup-legend .icon { font-size: 1.1rem; }
/* Language toggle */
.lang-toggle {
  display: flex; gap: 0; border-radius: 50px; overflow: hidden;
  border: 1.5px solid rgba(160,130,210,0.25);
  background: rgba(20,16,35,0.6);
}
.lang-btn {
  padding: 4px 12px; font-family: 'Quicksand', sans-serif;
  font-weight: 700; font-size: 0.72rem; border: none;
  background: transparent; color: var(--text-mid);
  cursor: pointer; transition: all 0.25s;
}
.lang-btn.active {
  background: linear-gradient(135deg, var(--pink-hot), var(--purple-mid));
  color: #fff;
}
@media (max-width: 600px) {
  .game-title { font-size: 0.9rem; }
  .top-right { gap: 8px; font-size: 0.75rem; }
  .back-btn { padding: 5px 10px; font-size: 0.75rem; }
  .lang-btn { padding: 3px 8px; font-size: 0.65rem; }
}
</style>

<script>
// ========== FIREBASE INIT ==========
const _fc = 'fSJZVk1SSEVEMlJKLUciIDoiZEl0bmVtZXJ1c2FlbSIgLCIzNjI0NjRmMDkwZDU0NDEyYmM1YmVmOmJldzo2MDk2ODE3MTQxODY6MSIgOiJkSXBwYSIgLCI2MDk2ODE3MTQxODYiIDoiZElyZWRuZVNnbmlnYXNzZW0iICwicHBhLmVnYXJvdHNlc2FiZXJpZi5pYS1uZXR0aWstZXR1YyIgOiJ0ZWtjdUJlZ2Fyb3RzIiAsImlhLW5ldHRpay1ldHVjIiA6ImRJdGNlam9ycCIgLCJtb2MucHBhZXNhYmVyaWYuaWEtbmV0dGlrLWV0dWMiIDoibmlhbW9EaHR1YSIgLCJrMzA5YkVGZlZ1a0taMXlBWE10djZ3al9peW9OV3A1d0J5U2F6SUEiIDoieWVLaXBhIns=';
let db;
try {
  const s1 = document.createElement('script');
  s1.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
  const s2 = document.createElement('script');
  s2.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
  // We'll init firebase after scripts load
} catch(e) { console.warn('Firebase scripts skipped'); }

function initFirebase() {
  if (typeof firebase !== 'undefined' && !db) {
    try {
      const firebaseConfig = JSON.parse(atob(_fc).split('').reverse().join(''));
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
    } catch(e) { console.warn('Firebase init failed:', e); }
  }
}

function getUserId() {
  let uid = localStorage.getItem('ck_uid');
  if (!uid) {
    uid = 'u_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
    localStorage.setItem('ck_uid', uid);
  }
  return uid;
}

async function saveGameProgress(level, score) {
  initFirebase();
  if (!db) return;
  const uid = getUserId();
  try {
    await db.collection('game_progress').doc(uid).set({
      currentLevel: level,
      highestLevel: level,
      score: score,
      lastPlayedAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    }, { merge: true });
    // Also update highest level if needed
    const doc = await db.collection('game_progress').doc(uid).get();
    if (doc.exists && doc.data().highestLevel < level) {
      await db.collection('game_progress').doc(uid).set({ highestLevel: level }, { merge: true });
    }
  } catch(e) { console.warn('Save progress failed:', e); }
}

async function loadGameProgress() {
  initFirebase();
  if (!db) return null;
  const uid = getUserId();
  try {
    const doc = await db.collection('game_progress').doc(uid).get();
    if (doc.exists) return doc.data();
  } catch(e) { console.warn('Load progress failed:', e); }
  return null;
}

// ========== LOAD FIREBASE SCRIPTS DYNAMICALLY ==========
(function loadFirebaseScripts() {
  const s1 = document.createElement('script');
  s1.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
  s1.onload = function() {
    const s2 = document.createElement('script');
    s2.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
    s2.onload = function() { initFirebase(); };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
})();

// ========== GAME CONSTANTS & STATE ==========

  canvas.width = Math.floor(MAX_W * scale);
  canvas.height = Math.floor(MAX_H * scale);
}

// ========== GAME OBJECTS ==========
const BRICK_ROWS_BASE = 4;
const BRICK_COLS_BASE = 12;
const BRICK_PAD = 3;
const POWERUP_FOOD = 1;  // 猫粮 → 10 balls
const POWERUP_TREAT = 2; // 猫条 → 50 balls

let paddle = { w: 0, h: 0, x: 0, y: 0, speed: 7 };
let balls = [];
let bricks = [];
let walls = [];  // obstacle walls
let fallingItems = []; // power-up items falling
let catImg = new Image();
catImg.src = CAT_IMG_SRC;

// Brick colors pool
const BRICK_COLORS = [
  '#ff7eb3','#c9a0ff','#8eb8e8','#ffd97a','#ff6b6b',
  '#6bdfb8','#f0a0ff','#7eb3ff','#ffb347','#77dd77',
  '#ff6eb4','#b19cd9','#87ceeb','#ffa07a','#98fb98'
];

function getLevelConfig(lvl) {
  const rows = Math.min(BRICK_ROWS_BASE + Math.floor((lvl - 1) / 3), 16);
  const cols = Math.min(BRICK_COLS_BASE + Math.floor((lvl - 1) / 5), 18);
  const ballSpeed = 3 + Math.min(lvl * 0.15, 4);
  const foodChance = Math.max(0.12 - lvl * 0.001, 0.04);
  const treatChance = Math.max(0.06 - lvl * 0.001, 0.015);
  return { rows, cols, ballSpeed, foodChance, treatChance };
}

function initLevel(lvl) {
  const cw = canvas.width, ch = canvas.height;
  const cfg = getLevelConfig(lvl);

  // Paddle
  paddle.w = cw * 0.18;
  paddle.h = 16;
  paddle.x = (cw - paddle.w) / 2;
  paddle.y = ch - 50;

  // Balls
  balls = [{
    x: cw / 2, y: paddle.y - 10,
    dx: cfg.ballSpeed * (Math.random() > 0.5 ? 1 : -1),
    dy: -cfg.ballSpeed,
    r: 6, active: true
  }];

  // Bricks (size shrinks as cols increase)
  bricks = [];
  const brickW = (cw - BRICK_PAD * (cfg.cols + 1)) / cfg.cols;
  const brickH = Math.max(8, 14 - Math.floor(lvl / 10));
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      const rng = Math.random();
      let powerup = 0;
      if (rng < cfg.treatChance) powerup = POWERUP_TREAT;
      else if (rng < cfg.treatChance + cfg.foodChance) powerup = POWERUP_FOOD;
      bricks.push({
        x: BRICK_PAD + c * (brickW + BRICK_PAD),
        y: 50 + r * (brickH + BRICK_PAD),
        w: brickW, h: brickH,
        color: BRICK_COLORS[Math.floor(Math.random() * BRICK_COLORS.length)],
        alive: true, powerup
      });
    }
  }

  // Generate walls: box (口) shape enclosing bricks, bottom has gaps
  walls = [];
  const wallT = 8; // wall thickness
  const boxMargin = 6;
  const boxLeft = BRICK_PAD - boxMargin;
  const boxRight = BRICK_PAD + cfg.cols * (brickW + BRICK_PAD) - BRICK_PAD + boxMargin;
  const boxTop = 50 - boxMargin;
  const boxBottom = 50 + cfg.rows * (brickH + BRICK_PAD) - BRICK_PAD + boxMargin;
  const boxW = boxRight - boxLeft;
  const boxH = boxBottom - boxTop;

  // Top wall
  walls.push({ x: boxLeft, y: boxTop - wallT, w: boxW, h: wallT });
  // Left wall (vertical)
  walls.push({ x: boxLeft - wallT, y: boxTop - wallT, w: wallT, h: boxH + wallT * 2 });
  // Right wall (vertical)
  walls.push({ x: boxRight, y: boxTop - wallT, w: wallT, h: boxH + wallT * 2 });

  // Bottom wall with gaps - number of gaps decreases with level
  const numGaps = Math.max(2, 4 - Math.floor(lvl / 20));
  // Gap width shrinks with level
  const gapW = Math.max(boxW * 0.06, boxW * (0.14 - lvl * 0.001));
  // Distribute gaps evenly along the bottom
  const segmentW = boxW / (numGaps + 1);
  const gapPositions = [];
  for (let g = 0; g < numGaps; g++) {
    gapPositions.push(boxLeft + segmentW * (g + 1) - gapW / 2);
  }
  // Build bottom wall segments around gaps
  let prevX = boxLeft;
  for (let g = 0; g < gapPositions.length; g++) {
    const gx = gapPositions[g];
    if (gx > prevX) {
      walls.push({ x: prevX, y: boxBottom, w: gx - prevX, h: wallT });
    }
    prevX = gx + gapW;
  }
  if (prevX < boxRight) {
    walls.push({ x: prevX, y: boxBottom, w: boxRight - prevX, h: wallT });
  }

  fallingItems = [];
  updateHUD();
}

function updateHUD() {
  document.getElementById('levelDisplay').textContent = currentLevel;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('ballDisplay').textContent = balls.filter(b => b.active).length;
}

function handleInput() {
  const spd = paddle.speed * (canvas.width / MAX_W);
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) paddle.x = Math.max(0, paddle.x - spd);
  if (keys['ArrowRight'] || keys['d'] || keys['D']) paddle.x = Math.min(canvas.width - paddle.w, paddle.x + spd);
}

// ========== POWERUP SPLIT ==========
function splitBalls(count) {
  const cfg = getLevelConfig(currentLevel);
  const activeBalls = balls.filter(b => b.active);
  if (activeBalls.length === 0) return;
  const ref = activeBalls[0];
  for (let i = 0; i < count - 1; i++) {
    const angle = (Math.PI * 2 * i) / (count - 1);
    balls.push({
      x: ref.x, y: ref.y,
      dx: cfg.ballSpeed * Math.cos(angle),
      dy: cfg.ballSpeed * Math.sin(angle),
      r: 6, active: true
    });
  }
  // Ensure at least one goes upward
  balls.forEach(b => { if (b.active && b.dy > 0 && Math.random() > 0.5) b.dy = -Math.abs(b.dy); });
  updateHUD();
}

// ========== GAME LOOP ==========
function update() {
  const cw = canvas.width, ch = canvas.height;
  handleInput();

  // Update balls
  balls.forEach(ball => {
    if (!ball.active) return;
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Wall collisions
    if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
    if (ball.x + ball.r >= cw) { ball.x = cw - ball.r; ball.dx = -Math.abs(ball.dx); }
    if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }

    // Paddle collision
    if (ball.dy > 0 && ball.y + ball.r >= paddle.y && ball.y + ball.r <= paddle.y + paddle.h + 4
      && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
      ball.dy = -Math.abs(ball.dy);
      // Angle variation based on hit position
      const hitPos = (ball.x - paddle.x) / paddle.w; // 0..1
      const angle = (hitPos - 0.5) * 1.2;
      const spd = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
      ball.dx = spd * Math.sin(angle);
      ball.dy = -spd * Math.cos(angle);
    }

    // Brick collision - only ONE brick per ball per frame
    let hitBrick = false;
    for (let i = 0; i < bricks.length; i++) {
      const brick = bricks[i];
      if (!brick.alive || hitBrick) continue;
      if (ball.x + ball.r > brick.x && ball.x - ball.r < brick.x + brick.w
        && ball.y + ball.r > brick.y && ball.y - ball.r < brick.y + brick.h) {
        brick.alive = false;
        // Determine bounce direction
        const overlapTop = (ball.y + ball.r) - brick.y;
        const overlapBottom = (brick.y + brick.h) - (ball.y - ball.r);
        const overlapLeft = (ball.x + ball.r) - brick.x;
        const overlapRight = (brick.x + brick.w) - (ball.x - ball.r);
        const minOverlap = Math.min(overlapTop, overlapBottom, overlapLeft, overlapRight);
        if (minOverlap === overlapTop || minOverlap === overlapBottom) {
          ball.dy = -ball.dy;
        } else {
          ball.dx = -ball.dx;
        }
        score += 10;
        hitBrick = true;
        // Drop powerup
        if (brick.powerup) {
          fallingItems.push({
            x: brick.x + brick.w / 2, y: brick.y + brick.h,
            type: brick.powerup, speed: 2, active: true
          });
        }
      }
    }

    // Wall (obstacle) collision
    walls.forEach(wall => {
      if (ball.x + ball.r > wall.x && ball.x - ball.r < wall.x + wall.w
        && ball.y + ball.r > wall.y && ball.y - ball.r < wall.y + wall.h) {
        // Determine which side was hit
        const overlapLeft = (ball.x + ball.r) - wall.x;
        const overlapRight = (wall.x + wall.w) - (ball.x - ball.r);
        const overlapTop = (ball.y + ball.r) - wall.y;
        const overlapBottom = (wall.y + wall.h) - (ball.y - ball.r);
        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
        if (minOverlap === overlapTop || minOverlap === overlapBottom) {
          ball.dy = -ball.dy;
        } else {
          ball.dx = -ball.dx;
        }
      }
    });

    // Ball falls off bottom
    if (ball.y - ball.r > ch) { ball.active = false; }
  });

  // Update falling items
  fallingItems.forEach(item => {
    if (!item.active) return;
    item.y += item.speed;
    // Catch with paddle
    if (item.y >= paddle.y && item.y <= paddle.y + paddle.h + 10
      && item.x >= paddle.x && item.x <= paddle.x + paddle.w) {
      item.active = false;
      if (item.type === POWERUP_FOOD) splitBalls(10);
      else if (item.type === POWERUP_TREAT) splitBalls(50);
    }
    if (item.y > ch) item.active = false;
  });

  // Check active balls
  const activeBalls = balls.filter(b => b.active);
  if (activeBalls.length === 0) {
    // Game over
    gameRunning = false;
    showOverlay('gameOverScreen');
    return;
  }

  // Check bricks cleared
  const aliveBricks = bricks.filter(b => b.alive);
  if (aliveBricks.length === 0) {
    gameRunning = false;
    saveGameProgress(currentLevel, score);
    if (currentLevel >= 100) {
      showOverlay('allClearScreen');
    } else {
      document.getElementById('completedLevel').textContent = currentLevel;
      showOverlay('levelCompleteScreen');
    }
    return;
  }

  updateHUD();
}

function draw() {
  const cw = canvas.width, ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);

  // Draw bricks
  bricks.forEach(brick => {
    if (!brick.alive) return;
    ctx.fillStyle = brick.color;
    ctx.beginPath();
    const br = 3;
    ctx.roundRect(brick.x, brick.y, brick.w, brick.h, br);
    ctx.fill();
    // Powerup icons are hidden - surprise when broken!
  });

  // Draw walls (obstacles)
  walls.forEach(wall => {
    ctx.fillStyle = 'rgba(160,130,210,0.5)';
    ctx.beginPath();
    ctx.roundRect(wall.x, wall.y, wall.w, wall.h, 4);
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,170,255,0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Draw paddle + cat
  // Cat body (paddle)
  const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + paddle.w, paddle.y);
  grad.addColorStop(0, '#ff7eb3'); grad.addColorStop(1, '#c9a0ff');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 8);
  ctx.fill();
  ctx.shadowColor = 'rgba(255,126,179,0.5)';
  ctx.shadowBlur = 12;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Cat image above paddle
  const catH = 42;
  const catW = catH * (catImg.naturalWidth / catImg.naturalHeight) || catH * 0.6;
  if (catImg.complete && catImg.naturalWidth > 0) {
    ctx.drawImage(catImg, paddle.x + (paddle.w - catW) / 2, paddle.y - catH + 6, catW, catH);
  }

  // Draw balls
  balls.forEach(ball => {
    if (!ball.active) return;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    const bGrad = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.r);
    bGrad.addColorStop(0, '#fff');
    bGrad.addColorStop(1, '#ffd97a');
    ctx.fillStyle = bGrad;
    ctx.shadowColor = 'rgba(255,217,122,0.6)';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Draw falling items
  fallingItems.forEach(item => {
    if (!item.active) return;
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(item.type === POWERUP_FOOD ? '🐟' : '🍖', item.x, item.y);
  });
}

function gameLoop() {
  if (!gameRunning) return;
  update();
  if (gameRunning) draw();
  animFrameId = requestAnimationFrame(gameLoop);
}

// ========== SCREEN MANAGEMENT ==========
function showOverlay(id) {
  ['startScreen','levelCompleteScreen','gameOverScreen','allClearScreen'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
  // Re-apply language to ensure overlays are translated
  const lang = localStorage.getItem('ck_lang') || 'zh';
  setLang(lang);
}

function hideAllOverlays() {
  ['startScreen','levelCompleteScreen','gameOverScreen','allClearScreen'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
}

function startGame() {
  currentLevel = 1; score = 0;
  // Try to load saved progress
  loadGameProgress().then(data => {
    if (data && data.highestLevel > 1) {
      currentLevel = data.highestLevel;
      score = data.score || 0;
    }
    hideAllOverlays();
    initLevel(currentLevel);
    gameRunning = true;
    gameLoop();
  }).catch(() => {
    hideAllOverlays();
    initLevel(currentLevel);
    gameRunning = true;
    gameLoop();
  });
}

function nextLevel() {
  currentLevel++;
  hideAllOverlays();
  initLevel(currentLevel);
  gameRunning = true;
  gameLoop();
}

function retryLevel() {
  hideAllOverlays();
  initLevel(currentLevel);
  gameRunning = true;
  gameLoop();
}

function goHome() {
  window.location.href = 'index.html';
}

// Polyfill roundRect if needed
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r];
    const rad = r[0] || 0;
    this.moveTo(x + rad, y);
    this.lineTo(x + w - rad, y);
    this.quadraticCurveTo(x + w, y, x + w, y + rad);
    this.lineTo(x + w, y + h - rad);
    this.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
    this.lineTo(x + rad, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - rad);
    this.lineTo(x, y + rad);
    this.quadraticCurveTo(x, y, x + rad, y);
    this.closePath();
  };
}

      lcTitle.innerHTML = '🎉 Level <span><span id="completedLevel">' + lvl + '</span> Cleared</span>!';
    } else {
      lcTitle.innerHTML = '🎉 恭喜通过<span>第 <span id="completedLevel">' + lvl + '</span> 关</span>！';
    }
  }
  // Update start screen h2 (contains cat icon image)
  const startH2 = document.querySelector('#startScreen h2');
  if (startH2) {
    startH2.innerHTML = catIconTagLg + ' <span data-i18n="gameTitle">' + dict.gameTitle + '</span>';
  }
  // Update page title
  document.title = lang === 'en' ? 'Kitten Breakout - Cute Kitten' : '猫猫接球 - Cute Kitten';
}

// Init language from localStorage (synced with main page)
(function initLang() {
  const lang = localStorage.getItem('ck_lang') || 'zh';
  setLang(lang);
})();

</script>
</body>
