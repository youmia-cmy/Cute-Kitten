<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cute Kitten</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Zen+Maru+Gothic:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --purple-deep: #c9a0ff; --purple-mid: #a97edb;
  --purple-light: rgba(160,130,210,0.35); --pink-hot: #ff7eb3;
  --pink-soft: #ffb3d9; --blue-soft: #8eb8e8;
  --gold-star: #ffd97a; --bg-cream: #0c0a14;
  --text-dark: #ede4ff; --text-mid: #b8a0d8; --text-light: #8070a0;
  --card-bg: rgba(20,16,35,0.75);
  --glow-pink: rgba(255,126,179,0.35); --glow-purple: rgba(160,120,220,0.35);
}
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: 'Zen Maru Gothic', 'Quicksand', sans-serif;
  background: var(--bg-cream); color: var(--text-dark);
  display: flex; flex-direction: column;
  background:
    radial-gradient(ellipse at 15% 15%, rgba(120,60,180,0.25) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 20%, rgba(60,90,180,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 75%, rgba(180,60,120,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 55%, rgba(140,50,160,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 25% 60%, rgba(80,60,200,0.12) 0%, transparent 50%),
    linear-gradient(160deg, #0c0a14 0%, #12101e 25%, #140e1e 50%, #100e1a 75%, #0c0a14 100%);
  -webkit-font-smoothing: antialiased;
}

/* Top bar */
#topBar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; background: rgba(12,10,20,0.92);
  backdrop-filter: blur(8px); border-bottom: 1px solid rgba(160,130,210,0.15);
}
.top-left { display: flex; align-items: center; gap: 12px; }
.back-btn {
  display: flex; align-items: center; gap: 6px; padding: 6px 16px;
  border-radius: 50px; border: 1.5px solid rgba(160,130,210,0.25);
  background: rgba(20,16,35,0.6); color: var(--purple-mid);
  font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.82rem;
  cursor: pointer; transition: all 0.25s; text-decoration: none;
}
.back-btn:hover { border-color: var(--pink-hot); color: var(--pink-hot); background: rgba(255,126,179,0.1); }
.page-title {
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: 1.05rem; color: var(--purple-deep);
}
.nick-display {
  font-size: 0.7rem; color: var(--pink-soft); opacity: 0.7;
  cursor: pointer; font-family: 'Quicksand', sans-serif;
  border-bottom: 1px dashed rgba(255,126,179,0.3);
  padding-bottom: 1px; transition: opacity 0.2s; margin-left: 6px;
}
.nick-display:hover { opacity: 1; }
.heart-beat {
  display: inline-block; color: #ff7eb3; font-size: 0.85rem;
  margin-left: 10px; margin-right: 2px;
  animation: heartPulse 1s ease-in-out infinite;
}
@keyframes heartPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}
.top-right { display: flex; align-items: center; gap: 14px; }
.lang-toggle { display: flex; gap: 2px; background: rgba(20,16,35,0.6); border-radius: 20px; padding: 2px; border: 1px solid rgba(160,130,210,0.15); }
.lang-btn { background: none; border: none; color: var(--text-light); font-size: 0.72rem; font-weight: 700; padding: 4px 10px; border-radius: 18px; cursor: pointer; transition: all 0.2s; font-family: 'Quicksand', sans-serif; }
.lang-btn.active { background: linear-gradient(135deg, rgba(255,126,179,0.25), rgba(160,120,220,0.25)); color: var(--pink-soft); }

/* Chat container */
#chatContainer {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto; padding: 280px 16px 130px 16px;
  scroll-behavior: smooth;
}
#chatContainer::-webkit-scrollbar { width: 4px; }
#chatContainer::-webkit-scrollbar-thumb { background: rgba(160,130,210,0.3); border-radius: 4px; }

.msg-row { display: flex; margin-bottom: 12px; gap: 8px; animation: fadeInMsg 0.3s ease; }
.msg-row.bot { flex-direction: row; align-items: flex-start; }
.msg-row.user { flex-direction: row-reverse; align-items: flex-start; }
.msg-row.user > div { max-width: 72%; flex-shrink: 0; }
.msg-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; object-fit: cover; border: 2px solid rgba(160,130,210,0.3); filter: drop-shadow(0 1px 4px rgba(255,126,179,0.2)); }
.msg-bubble {
  max-width: 72%; padding: 10px 14px; border-radius: 16px;
  font-size: 0.88rem; line-height: 1.55; word-break: break-word;
  min-width: 2em; white-space: pre-wrap; overflow-wrap: break-word;
}
.msg-row.bot .msg-bubble {
  background: var(--card-bg); border: 1px solid rgba(160,130,210,0.15);
  color: var(--text-dark); border-bottom-left-radius: 4px;
}
.msg-row.user .msg-bubble {
  background: linear-gradient(135deg, rgba(255,126,179,0.2), rgba(160,120,220,0.25));
  border: 1px solid rgba(255,126,179,0.2);
  color: var(--text-dark); border-bottom-right-radius: 4px;
  max-width: 100%; width: fit-content; word-break: normal;
}
.msg-time { font-size: 0.65rem; color: var(--text-light); margin-top: 4px; text-align: right; }
.msg-row.bot .msg-time { text-align: left; }

/* Typing indicator */
#typingIndicator {
  display: flex; align-items: center; gap: 8px; padding: 0 16px; margin-bottom: 8px;
  color: var(--text-light); font-size: 0.8rem;
}
.typing-dots { display: flex; gap: 4px; }
.typing-dots span {
  width: 6px; height: 6px; background: var(--purple-mid); border-radius: 50%;
  animation: typingBounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

/* Input bar */
#inputBar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 10px 16px 20px 16px; background: rgba(12,10,20,0.95);
  backdrop-filter: blur(8px); border-top: 1px solid rgba(160,130,210,0.15);
}
.input-wrapper {
  display: flex; gap: 8px; align-items: center;
  background: rgba(20,16,35,0.6); border: 1px solid rgba(160,130,210,0.2);
  border-radius: 24px; padding: 4px 4px 4px 16px;
}
.input-wrapper input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text-dark); font-size: 0.88rem; font-family: inherit;
}
.input-wrapper input::placeholder { color: var(--text-light); }
#sendBtn {
  width: 38px; height: 38px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--pink-hot), var(--purple-mid));
  color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s; flex-shrink: 0;
}
#sendBtn:hover { transform: scale(1.1); }
.input-actions { display: flex; justify-content: center; margin-top: 8px; }
.action-btn {
  background: linear-gradient(135deg, rgba(255,217,122,0.15), rgba(255,126,179,0.15));
  border: 1px solid rgba(255,217,122,0.25); color: var(--gold-star);
  padding: 5px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
  font-family: 'Quicksand', sans-serif; cursor: pointer; transition: all 0.25s;
}
.action-btn:hover { background: rgba(255,217,122,0.25); transform: scale(1.05); }

/* Modals */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
}
.modal-card {
  background: linear-gradient(160deg, #1a1530, #14101e);
  border: 1px solid rgba(160,130,210,0.2); border-radius: 20px;
  padding: 30px; max-width: 380px; width: 90%; text-align: center;
}
.modal-avatar { margin-bottom: 16px; }
.modal-avatar img { width: 100px; height: 100px; border-radius: 16px; object-fit: contain; border: none; filter: drop-shadow(0 2px 8px rgba(255,126,179,0.3)); }
.modal-card h2 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--purple-deep); margin-bottom: 8px; }
.modal-card p { font-size: 0.85rem; color: var(--text-mid); margin-bottom: 16px; line-height: 1.5; }
.modal-card input {
  width: 100%; padding: 10px 16px; border-radius: 12px; border: 1px solid rgba(160,130,210,0.25);
  background: rgba(20,16,35,0.6); color: var(--text-dark); font-size: 0.9rem;
  font-family: inherit; outline: none; margin-bottom: 12px; text-align: center;
}
.modal-card input:focus { border-color: var(--pink-hot); }
#nickConfirmBtn {
  width: 100%; padding: 12px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, var(--pink-hot), var(--purple-mid));
  color: #fff; font-size: 0.95rem; font-weight: 700; font-family: 'Quicksand', sans-serif;
  cursor: pointer; transition: transform 0.2s;
}
#nickConfirmBtn:hover { transform: scale(1.03); }

/* Payment modal */
.payment-card { position: relative; }
.modal-close {
  position: absolute; top: 12px; right: 16px; background: none; border: none;
  color: var(--text-light); font-size: 1.5rem; cursor: pointer;
}
.pay-price {
  font-size: 2rem; font-weight: 800; font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, var(--gold-star), var(--pink-hot));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin: 12px 0;
}
.pay-methods { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
.pay-btn {
  padding: 12px; border-radius: 12px; border: 1px solid rgba(160,130,210,0.25);
  background: rgba(20,16,35,0.6); color: var(--text-dark); font-size: 0.88rem;
  font-weight: 600; font-family: 'Quicksand', sans-serif; cursor: pointer; transition: all 0.25s;
}
.pay-btn:hover { border-color: var(--pink-hot); background: rgba(255,126,179,0.1); }
.pay-chains { font-size: 0.75rem; color: var(--text-light); margin-top: 8px; }
.pay-status { margin-top: 12px; font-size: 0.82rem; color: var(--gold-star); min-height: 20px; }

/* Welcome header (fixed below top bar) */
#welcomeHeader {
  position: fixed; top: 48px; left: 0; right: 0; z-index: 90;
  background: rgba(12,10,20,0.95); backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(160,130,210,0.1);
  padding: 12px 16px 10px 16px;
}
.welcome-section { text-align: center; }
.welcome-avatar { width: auto; height: 120px; border-radius: 12px; object-fit: contain; border: none; margin-bottom: 8px; filter: drop-shadow(0 4px 16px rgba(255,126,179,0.3)); }
.welcome-name { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem; color: var(--pink-hot); margin-bottom: 2px; }
.welcome-desc { font-size: 0.78rem; color: var(--text-mid); line-height: 1.4; }

.hidden { display: none !important; }

@keyframes fadeInMsg { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes typingBounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

/* Responsive */
@media (max-width: 480px) {
  #topBar { padding: 8px 10px; }
  .top-left { gap: 6px; }
  .back-btn { font-size: 0.65rem; padding: 4px 10px; white-space: nowrap; }
  .page-title { font-size: 0.75rem; white-space: nowrap; }
  .heart-beat { margin-left: 4px; margin-right: 0; font-size: 0.7rem; }
  .nick-display { font-size: 0.58rem; margin-left: 2px; white-space: nowrap; display: inline-block; }
  .lang-toggle { font-size: 0.6rem; }
  .lang-btn { padding: 3px 7px; }
  .msg-bubble { max-width: 80%; }
}
</style>
</head>
<body>
<!-- === TOP BAR === -->
<div id="topBar">
  <div class="top-left">
    <a href="index.html" class="back-btn" data-i18n="backBtn">← 返回首页</a>
    <div class="page-title" data-i18n="pageTitle">Cute Kitten</div>
    <span class="heart-beat">♥</span>
    <span id="nickDisplay" class="nick-display" onclick="changeNickname()" title="点击修改昵称"></span>
  </div>
  <div class="top-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="langZh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" id="langEn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div>

<!-- === NICKNAME MODAL === -->
<div id="nicknameModal" class="modal-overlay hidden">
  <div class="modal-card">
    <div class="modal-avatar"><img id="modalAvatar" alt="Cute Kitten"></div>
    <h2 data-i18n="nickTitle">给自己取个昵称吧~</h2>
    <p data-i18n="nickDesc">Cute Kitten想知道怎么称呼你喵~</p>
    <input type="text" id="nickInput" maxlength="20" data-i18n-placeholder="nickPlaceholder" placeholder="输入你的昵称...">
    <button id="nickConfirmBtn" onclick="confirmNickname()" data-i18n="nickConfirm">确定喵~</button>
  </div>
</div>

<!-- === WELCOME HEADER (fixed) === -->
<div id="welcomeHeader" class="hidden">
  <div class="welcome-section">
    <img class="welcome-avatar" id="welcomeAvatar" alt="Cute Kitten">
    <div class="welcome-name">Cute Kitten</div>
    <div class="welcome-desc" data-i18n="welcomeDesc">嗨~ 我是Cute Kitten，你的专属撒娇小猫咪喵~ 有什么想聊的就告诉我吧！</div>
  </div>
</div>

<!-- === CHAT CONTAINER === -->
<div id="chatContainer" class="hidden">
  <div id="chatMessages"></div>
  <div id="typingIndicator" class="hidden">
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span data-i18n="typing">Cute Kitten正在想...</span>
  </div>
</div>

<!-- === INPUT BAR === -->
<div id="inputBar" class="hidden">
  <div class="input-wrapper">
    <input type="text" id="msgInput" data-i18n-placeholder="msgPlaceholder" placeholder="和Cute Kitten说点什么..." maxlength="500">
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/></svg>
    </button>
  </div>
  <div class="input-actions">
    <button class="action-btn" id="upgradeBtn" onclick="showPayment()" data-i18n="upgradeBtn">升级高级版</button>
  </div>
</div>

<!-- === PAYMENT MODAL === -->
<div id="paymentModal" class="modal-overlay hidden">
  <div class="modal-card payment-card">
    <button class="modal-close" onclick="closePayment()">&times;</button>
    <h2 data-i18n="payTitle">解锁高级Cute Kitten</h2>
    <p data-i18n="payDesc">升级后Cute Kitten会变得更聪明，懂加密货币，帮你分析行情喵~</p>
    <div class="pay-price">5.99 USDT</div>
    <div class="pay-methods">
      <button class="pay-btn" onclick="payWithWallet('okx')" data-i18n="payOkx">OKX Wallet</button>
      <button class="pay-btn" onclick="payWithWallet('tp')" data-i18n="payTp">TokenPocket</button>
    </div>
    <div class="pay-chains">
      <span data-i18n="payChains">支持 USDT / SOL 支付</span>
    </div>
    <div id="payStatus" class="pay-status"></div>
  </div>
</div>

}

function checkUser() {
  const saved = localStorage.getItem('ck_chat_user');
  if (saved) {
    userKey = saved;

function updateNickDisplay(nick) {

// ========== CHAT LOGIC ==========
async function initChat() {
  // Load history from Firebase
  if (db && userKey) {
    try {
      const doc = await db.collection('chatUsers').doc(userKey).get();
      if (doc.exists) {
        const data = doc.data();
        chatHistory = data.messages || [];
        isPremium = data.premium || false;
        if (isPremium) {
          localStorage.setItem('ck_chat_premium', 'true');
          const btn = document.getElementById('upgradeBtn');
          if (btn) btn.style.display = 'none';
        }
      }
    } catch (e) { console.log('Firebase load error:', e); }
  }

  const container = document.getElementById('chatMessages');
  container.innerHTML = '';

  // Set welcome header avatar
  const lang = localStorage.getItem('ck_lang') || 'zh';
  const dict = i18nDict[lang] || i18nDict.zh;
  document.getElementById('welcomeAvatar').src = CHAT_CAT_B64;
  document.getElementById('welcomeHeader').classList.remove('hidden');
  setTimeout(adjustChatPadding, 50);

  // Render history
  chatHistory.forEach(msg => {
    appendMessage(msg.role, msg.text, msg.time, false);
  });

  // If no history, send greeting
  if (chatHistory.length === 0) {
    const greeting = dict.botGreeting;
    appendMessage('bot', greeting, getTimeStr(), false);
    chatHistory.push({ role: 'bot', text: greeting, time: getTimeStr() });
    saveChatHistory();
  }

  scrollToBottom();
}

function getTimeStr() {
  const d = new Date();
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}

function appendMessage(role, text, time, animate) {
  const container = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  if (role === 'bot') {
    row.innerHTML = '<img class="msg-avatar" src="' + CHAT_AVATAR_B64 + '" alt="CK">' +
      '<div><div class="msg-bubble">' + escapeHtml(text) + '</div><div class="msg-time">' + time + '</div></div>';
  } else {
    row.innerHTML = '<div><div class="msg-bubble">' + escapeHtml(text) + '</div><div class="msg-time">' + time + '</div></div>';
  }

  if (animate !== false) row.style.animation = 'fadeInMsg 0.3s ease';
  container.appendChild(row);
  scrollToBottom();
}

function escapeHtml(t) {
  return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

function scrollToBottom() {
  const c = document.getElementById('chatContainer');
  setTimeout(() => { c.scrollTop = c.scrollHeight; }, 50);
}

function adjustChatPadding() {
  const header = document.getElementById('welcomeHeader');
  const container = document.getElementById('chatContainer');
  if (header && container && !header.classList.contains('hidden')) {
    const headerBottom = header.offsetTop + header.offsetHeight;
    container.style.paddingTop = (headerBottom + 10) + 'px';
  }
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const time = getTimeStr();
  appendMessage('user', text, time, true);
  chatHistory.push({ role: 'user', text: text, time: time });

  // Show typing indicator
  document.getElementById('typingIndicator').classList.remove('hidden');
  scrollToBottom();

  // Call API (placeholder - will use mock response)
  try {
    const reply = await callChatAPI(text);
    document.getElementById('typingIndicator').classList.add('hidden');
    const replyTime = getTimeStr();
    appendMessage('bot', reply, replyTime, true);
    chatHistory.push({ role: 'bot', text: reply, time: replyTime });
    saveChatHistory();
  } catch (e) {
    document.getElementById('typingIndicator').classList.add('hidden');
    const lang = localStorage.getItem('ck_lang') || 'zh';
    const errMsg = lang === 'zh' ? 'Cute Kitten走神了，再试一次吧喵~' : 'Cute Kitten got distracted, try again meow~';
    appendMessage('bot', errMsg, getTimeStr(), true);
  }
}

// ========== GEMINI API ==========
const _k = [27,19,32,59,9,35,27,22,54,17,14,61,35,43,27,105,43,23,32,106,5,35,30,104,31,55,35,30,28,40,43,20,34,106,61,30,110,32,57];
function _dk() { return _k.map(function(b) { return String.fromCharCode(b ^ 0x5A); }).join(''); }

const GEMINI_MODEL = 'gemini-3-flash-preview';
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_MODEL + ':generateContent';

function buildSystemPrompt() {
  const lang = localStorage.getItem('ck_lang') || 'zh';
  const nick = (localStorage.getItem('ck_chat_user') || '').split('_')[0] || '';
  if (lang === 'zh') {
    return '你是Cute Kitten，一只超级可爱的猫娘角色。你性格温柔、撒娇、活泼，说话带有猫咪的语气（经常用"喵~"、"呜呜"等）。' +
      '你喜欢被夸奖，会害羞，对主人很依赖。回复必须简短可爱，严格控制在50字以内，不要超过两句话。' +
      '不要回复任何代码或技术内容。不要使用markdown格式。始终保持角色扮演。' +
      (nick ? '对方的昵称是"' + nick + '"，你可以亲切地称呼对方。' : '') +
      (isPremium ? '你还懂加密货币和区块链，可以用可爱的方式帮主人分析行情。' : '');
  } else {
    return 'You are Cute Kitten, an adorable cat-girl character. You are sweet, cuddly, playful, and speak with cute cat mannerisms (using "meow~", "nyaa" etc). ' +
      'You love being praised, get shy easily, and are very attached to your owner. Keep replies very short and cute (under 50 words, max 2 sentences). ' +
      'Never reply with code or technical content. Never use markdown formatting. Always stay in character.' +
      (nick ? ' The user\'s nickname is "' + nick + '", address them affectionately.' : '') +
      (isPremium ? ' You also know about crypto and blockchain, and can help analyze markets in a cute way.' : '');
  }
}

function buildMessages(userMsg) {
  // Build conversation history for context (last 10 messages)
  const recent = chatHistory.slice(-10);
  const contents = [];
  // System instruction as first user turn
  contents.push({ role: 'user', parts: [{ text: buildSystemPrompt() }] });
  contents.push({ role: 'model', parts: [{ text: '好的喵~我是Cute Kitten，我会保持角色扮演的喵！' }] });
  // History
  recent.forEach(function(msg) {
    contents.push({
      role: msg.role === 'bot' ? 'model' : 'user',
      parts: [{ text: msg.text }]
    });
  });
  // Current message
  contents.push({ role: 'user', parts: [{ text: userMsg }] });
  return contents;
}

async function callChatAPI(userMsg) {
  try {
    const contents = buildMessages(userMsg);
    const resp = await fetch(GEMINI_URL + '?key=' + _dk(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: contents,
        generationConfig: {
          temperature: 0.85,
          maxOutputTokens: 2048,
          topP: 0.9,
          thinkingConfig: { thinkingBudget: 0 }
        },
        safetySettings: [
          { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_MEDIUM_AND_ABOVE' },
          { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
        ]
      })
    });

    if (!resp.ok) {
      throw new Error('API error: ' + resp.status);
    }

    const data = await resp.json();
    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
      var parts = data.candidates[0].content.parts;
      // Some models return thinking + text parts; pick the last text part
      var text = '';
      for (var i = parts.length - 1; i >= 0; i--) {
        if (parts[i].text && parts[i].text.trim().length > 1) {
          text = parts[i].text; break;
        }
      }
      if (!text) text = parts[parts.length - 1].text || '';
      return text.trim();
    }
    throw new Error('No response');
  } catch (e) {
    console.log('Gemini API error:', e);
    // Fallback to mock response
    return fallbackResponse();
  }
}

function fallbackResponse() {
  const lang = localStorage.getItem('ck_lang') || 'zh';
  const zh = ['呜呜~Cute Kitten有点走神了喵，再说一次吧~', '喵~网络好像不太好，Cute Kitten没听清呢~', '啊呜...Cute Kitten打了个盹，再跟我说说嘛~'];
  const en = ['Meow~ Cute Kitten got distracted, say that again~', 'Nyaa~ the connection seems shaky, Cute Kitten missed that~', 'Aww... Cute Kitten dozed off, tell me again~'];
  const pool = lang === 'zh' ? zh : en;
  return pool[Math.floor(Math.random() * pool.length)];
}

async function saveChatHistory() {
  if (!db || !userKey) return;
  try {
    // Keep last 200 messages max
    const msgs = chatHistory.slice(-200);
    await db.collection('chatUsers').doc(userKey).set({
      messages: msgs,
      premium: isPremium,
      updatedAt: new Date().toISOString()
    }, { merge: true });
  } catch (e) { console.log('Save error:', e); }
}

const PAY_WALLET = '0x754104292463f0a14ae23c79b2d3395d3398cccc';
const PAY_AMOUNT = 5.99;

function showPayment() {
  document.getElementById('paymentModal').classList.remove('hidden');
  document.getElementById('payStatus').textContent = '';
}
function closePayment() {
  document.getElementById('paymentModal').classList.add('hidden');
}

async function payWithWallet(type) {
  const statusEl = document.getElementById('payStatus');
  const lang = localStorage.getItem('ck_lang') || 'zh';
  const dict = i18nDict[lang] || i18nDict.zh;

  let provider = null;
  if (type === 'okx') {
    provider = window.okxwallet;
    if (!provider) { statusEl.textContent = dict.payNoOkx || 'OKX Wallet not detected'; return; }
  } else if (type === 'tp') {
    provider = window.ethereum;
    if (!provider) { statusEl.textContent = dict.payNoTp || 'TokenPocket not detected'; return; }
  }

  try {
    statusEl.textContent = dict.payConnecting || 'Connecting...';
    const accounts = await provider.request({ method: 'eth_requestAccounts' });
    if (!accounts || !accounts.length) { statusEl.textContent = dict.payNoAccount || 'No account'; return; }

    statusEl.textContent = dict.payConfirming || 'Confirming...';

    // USDT on BSC: contract 0x55d398326f99059fF775485246999027B3197955
    const usdtContract = '0x55d398326f99059fF775485246999027B3197955';
    const amount = BigInt(Math.round(PAY_AMOUNT * 1e18)).toString(16);
    const transferData = '0xa9059cbb' +
      PAY_WALLET.slice(2).padStart(64, '0') +
      amount.padStart(64, '0');

    const tx = await provider.request({
      method: 'eth_sendTransaction',
      params: [{
        from: accounts[0],
        to: usdtContract,
        data: transferData,
        chainId: '0x38' // BSC
      }]
    });

    isPremium = true;
    localStorage.setItem('ck_chat_premium', 'true');
    if (db && userKey) {
      await db.collection('chatUsers').doc(userKey).set({ premium: true }, { merge: true });
    }
    statusEl.textContent = (dict.paySuccess || 'Success! TX: ') + tx.slice(0, 16) + '...';
    const btn = document.getElementById('upgradeBtn');
    if (btn) btn.style.display = 'none';
    setTimeout(closePayment, 2000);

  } catch (e) {
    if (e.code === 4001) {
      statusEl.textContent = dict.payCancelled || 'Cancelled';
    } else {
      statusEl.textContent = (dict.payFailed || 'Failed: ') + (e.message || '').slice(0, 50);
    }
  }
}

function setLang(lang) {
  if (!lang) lang = 'zh';
  var prevLang = localStorage.getItem('ck_lang') || 'zh';
  localStorage.setItem('ck_lang', lang);
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', (btn.textContent.trim() === '中文' && lang === 'zh') || (btn.textContent.trim() === 'EN' && lang === 'en'));
  });
  // Apply translations
  const dict = i18nDict[lang] || i18nDict.zh;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key]) el.innerHTML = dict[key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (dict[key]) el.placeholder = dict[key];
  });
  document.title = lang === 'zh' ? 'Cute Kitten' : 'Cute Kitten';
  // Update nickname display language
  var nick = (localStorage.getItem('ck_chat_user') || '').split('_')[0];
  if (nick) updateNickDisplay(nick);
  // Translate existing chat messages if language changed
  if (prevLang !== lang && chatHistory.length > 0) {
    translateChatHistory(lang);
  }
}

async function translateChatHistory(targetLang) {
  if (chatHistory.length === 0) return;
  var langName = targetLang === 'zh' ? '中文' : 'English';
  var textsToTranslate = [];
  var indices = [];
  chatHistory.forEach(function(msg, i) {
    textsToTranslate.push(msg.text);
    indices.push(i);
  });
  if (textsToTranslate.length === 0) return;
  try {
    var prompt = 'Translate the following chat messages to ' + langName + '. ' +
      'Return ONLY a JSON array of translated strings, one for each input message, in the same order. ' +
      'Keep the same tone, emojis, and style. Do not add explanations.\n\n' +
      JSON.stringify(textsToTranslate);
    var resp = await fetch(GEMINI_URL + '?key=' + _dk(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role: 'user', parts: [{ text: prompt }] }],
        generationConfig: {
          temperature: 0.3,
          maxOutputTokens: 4096,
          topP: 0.9,
          thinkingConfig: { thinkingBudget: 0 }
        }
      })
    });
    if (!resp.ok) return;
    var data = await resp.json();
    if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) return;
    var parts = data.candidates[0].content.parts;
    var rawText = parts[parts.length - 1].text || '';
    // Extract JSON array from response
    var jsonMatch = rawText.match(/\[[\s\S]*\]/);
    if (!jsonMatch) return;
    var translated = JSON.parse(jsonMatch[0]);
    if (!Array.isArray(translated) || translated.length !== textsToTranslate.length) return;
    // Update chat history and re-render
    for (var i = 0; i < indices.length; i++) {
      chatHistory[indices[i]].text = translated[i];
    }
    // Re-render all messages
    var container = document.getElementById('chatMessages');
    container.innerHTML = '';
    chatHistory.forEach(function(msg) {
      appendMessage(msg.role, msg.text, msg.time, false);
    });
    scrollToBottom();
    saveChatHistory();
  } catch (e) {
    console.log('Translation error:', e);
  }
}
