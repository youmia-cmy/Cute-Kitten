<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cute Kitten</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--cyan:#00f0ff;--pink:#ff2d95;--purple:#b44aff;--gold:#ffd700;--bg-deep:#06070d;--bg-card:#0c0e1a;--text:#e0e6f0;--text-dim:#6a7194;--radius:12px;--font-display:'Orbitron',sans-serif;--font-body:'Noto Sans SC',sans-serif;--font-mono:'Fira Code',monospace;--glow-cyan:0 0 20px rgba(0,240,255,.35)}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg-deep);color:var(--text);min-height:100vh;overflow-x:hidden}
canvas#particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
.app-wrapper{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
header{padding:16px 20px 0;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;border-radius:50%;overflow:hidden;box-shadow:var(--glow-cyan);flex-shrink:0}
.logo-icon img{width:100%;height:100%;object-fit:cover}
.logo-text{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:2px;color:var(--cyan)}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.balance-chip{display:flex;align-items:center;gap:6px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);border-radius:100px;padding:6px 14px;font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--gold)}
.balance-chip .coin{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#ffd700,#ffaa00);display:grid;place-items:center;font-size:11px;color:#1a1200;font-weight:900}
.user-chip{padding:6px 16px;border-radius:100px;border:1px solid rgba(0,240,255,.25);background:rgba(0,240,255,.06);color:var(--cyan);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:all .3s;display:flex;align-items:center;gap:4px}
.user-chip:hover{background:rgba(0,240,255,.12)}
nav{display:flex;justify-content:center;gap:4px;padding:14px 12px 0;flex-wrap:wrap}
.nav-tab{font-family:var(--font-body);font-weight:700;font-size:12px;padding:9px 16px;border-radius:100px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:var(--text-dim);cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.nav-tab::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,var(--cyan),var(--purple));opacity:0;transition:opacity .3s}
.nav-tab span{position:relative;z-index:1}
.nav-tab:hover{border-color:rgba(255,255,255,.15);color:var(--text)}
.nav-tab.active{border-color:transparent;color:#fff;box-shadow:var(--glow-cyan)}
.nav-tab.active::before{opacity:1}
main{flex:1;padding:24px 16px 60px;max-width:900px;margin:0 auto;width:100%}
.section{display:none;animation:fadeUp .45s cubic-bezier(.22,1,.36,1)}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.sec-title{font-family:var(--font-display);font-size:clamp(20px,5vw,30px);font-weight:900;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,var(--cyan),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sec-desc{text-align:center;color:var(--text-dim);font-size:13px;margin-bottom:28px}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:grid;place-items:center}
.modal{width:90%;max-width:380px;background:var(--bg-card);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:28px 24px}
.modal-tabs{display:flex;gap:4px;margin-bottom:20px}
.modal-tab{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:transparent;color:var(--text-dim);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:all .3s}
.modal-tab.active{background:rgba(0,240,255,.1);border-color:rgba(0,240,255,.3);color:var(--cyan)}
.auth-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text);font-size:14px;margin-bottom:10px;outline:none;font-family:var(--font-body)}
.auth-input:focus{border-color:var(--cyan)}
select.auth-input,select.profile-input{appearance:auto;background:rgba(255,255,255,.04)}
.auth-btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:700;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--cyan),var(--purple));margin-top:6px;font-family:var(--font-body)}
.auth-err{color:#ff6b6b;font-size:12px;margin-top:8px;text-align:center;min-height:18px}
.rank-lianqi{color:#8892b0}.rank-zhuji{color:#4ade80;text-shadow:0 0 8px rgba(74,222,128,.3)}.rank-jindan{color:#00f0ff;text-shadow:0 0 10px rgba(0,240,255,.4)}.rank-yuanying{color:#b44aff;text-shadow:0 0 12px rgba(180,74,255,.4)}.rank-huashen{color:#ff2d95;text-shadow:0 0 14px rgba(255,45,149,.5)}.rank-dacheng{color:#ffd700;text-shadow:0 0 18px rgba(255,215,0,.5),0 0 40px rgba(255,215,0,.2)}
.rank-dadi{color:#d4af37;text-shadow:0 0 20px rgba(212,175,55,.6),0 0 40px rgba(212,175,55,.3),0 0 60px rgba(212,175,55,.15);font-weight:900;animation:gildShine 3s ease infinite}
@keyframes gildShine{0%,100%{filter:brightness(1) drop-shadow(0 0 4px rgba(212,175,55,.4))}50%{filter:brightness(1.3) drop-shadow(0 0 12px rgba(212,175,55,.7))}}
.forge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:20px}
.forge-card{padding:16px;border-radius:var(--radius);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);text-align:center;transition:all .3s}
.forge-card:hover{border-color:rgba(0,240,255,.2)}
.forge-card .fname{font-size:16px;font-weight:900;margin-bottom:4px}
.forge-card .fflavor{font-size:11px;color:var(--text-dim);font-style:italic}
.forge-card .frank{font-size:10px;font-family:var(--font-mono);margin-bottom:6px;letter-spacing:2px}
.forge-card .equip-btn{margin-top:8px;padding:4px 14px;border-radius:100px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--text-dim);font-size:11px;cursor:pointer;font-family:var(--font-body);transition:all .3s}
.forge-card .equip-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.forge-card .equip-btn.equipped{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.08)}
.forge-btn{display:block;margin:0 auto 16px;padding:14px 40px;border-radius:100px;border:none;font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:2px;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--purple),var(--pink));box-shadow:0 4px 30px rgba(180,74,255,.3);transition:all .35s}
.forge-btn:hover{transform:translateY(-2px) scale(1.03)}
.forge-btn:disabled{opacity:.35;pointer-events:none}
.custom-title-box{max-width:400px;margin:0 auto 24px;display:flex;gap:8px}
.custom-title-input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text);font-size:14px;outline:none;font-family:var(--font-body)}
.custom-title-btn{padding:10px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold),#ffaa00);color:#1a1200;font-size:12px;font-weight:900;cursor:pointer;font-family:var(--font-body);white-space:nowrap}
.custom-title-btn:disabled{opacity:.35;pointer-events:none}
/* GAME */
.game-wrapper{position:relative;width:100%;max-width:800px;margin:0 auto;border-radius:var(--radius);overflow:hidden;border:2px solid rgba(0,240,255,.2);background:#000}
.game-wrapper canvas{display:block;width:100%;image-rendering:pixelated}
.game-hud{display:flex;justify-content:space-between;padding:8px 14px;background:rgba(0,0,0,.6);font-family:var(--font-mono);font-size:12px;color:var(--text)}
.game-hud .hp-bar{width:120px;height:10px;background:rgba(255,255,255,.1);border-radius:100px;overflow:hidden}
.game-hud .hp-fill{height:100%;background:linear-gradient(90deg,#ff4444,#ff8800);border-radius:100px;transition:width .3s}
.game-controls{display:flex;justify-content:space-between;padding:12px;background:rgba(0,0,0,.4);border-radius:0 0 var(--radius) var(--radius)}
.game-controls .dpad{display:flex;gap:6px}
.game-controls .actions{display:flex;gap:6px}
.gbtn{width:48px;height:48px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:var(--text);font-size:18px;display:grid;place-items:center;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;transition:all .15s}
.gbtn:active,.gbtn.pressed{background:rgba(0,240,255,.2);border-color:var(--cyan);transform:scale(.92)}
.gbtn.fire{border-color:rgba(255,45,149,.4);color:var(--pink)}
.gbtn.fire:active,.gbtn.fire.pressed{background:rgba(255,45,149,.2)}
.gbtn.jump{border-color:rgba(74,222,128,.4);color:#4ade80}
.gbtn.jump:active,.gbtn.jump.pressed{background:rgba(74,222,128,.2)}
.game-menu{position:absolute;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5}
.game-menu h2{font-family:var(--font-display);font-size:24px;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.game-menu-btn{padding:12px 36px;border-radius:100px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:all .3s}
.game-menu-btn:hover{background:rgba(0,240,255,.1);border-color:var(--cyan);color:var(--cyan)}
.game-menu-btn.primary{border:none;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff}
.game-keys{font-size:11px;color:var(--text-dim);text-align:center;line-height:1.8;margin-top:8px}
.level-select{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:16px;width:90%;max-width:500px}
.level-card{padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);text-align:center;cursor:pointer;transition:all .3s}
.level-card:hover{border-color:var(--cyan)}
.level-card.locked{opacity:.3;cursor:not-allowed}
.level-card.cleared{border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.04)}
.level-card .lv-num{font-family:var(--font-display);font-size:18px;font-weight:900;color:var(--cyan)}
.level-card .lv-name{font-size:11px;color:var(--text-dim);margin-top:4px}
.level-card.cleared .lv-name{color:#4ade80}
/* COMMENTS */
.comment-composer{margin-bottom:24px}.comment-textarea{width:100%;height:80px;padding:12px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:var(--text);font-size:14px;resize:vertical;outline:none;font-family:var(--font-body);margin-bottom:8px}.comment-textarea:focus{border-color:var(--cyan)}.comment-post-btn{padding:10px 28px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-body)}.comment-list{display:flex;flex-direction:column;gap:12px}.comment-item{padding:16px;border-radius:var(--radius);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}.comment-item.vip-post{border:1px solid rgba(255,215,0,.25);background:linear-gradient(135deg,rgba(255,215,0,.04),rgba(255,140,0,.02));position:relative;overflow:hidden}.comment-item.vip-post::after{content:'VIP';position:absolute;top:8px;right:12px;font-size:9px;font-weight:900;font-family:var(--font-display);color:#d4af37;letter-spacing:2px;opacity:.5}.pinned-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:100px;background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,140,0,.1));border:1px solid rgba(255,215,0,.3);color:#ffd700;font-size:10px;font-weight:900;font-family:var(--font-display);letter-spacing:1px}.bounty-ended-banner{text-align:center;padding:12px;border-radius:8px;background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.15);color:#ff6b6b;font-size:13px;font-weight:700;margin-top:8px}.bounty-target-info{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-dim);margin-bottom:12px}.comment-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}.comment-nick{font-weight:700;font-size:14px}.comment-title-badge{font-size:11px;padding:2px 10px;border-radius:100px;font-weight:700;border:1px solid rgba(255,255,255,.1)}.comment-time{font-size:11px;color:var(--text-dim);margin-left:auto;font-family:var(--font-mono)}.comment-body{font-size:14px;line-height:1.7;margin-bottom:10px;word-break:break-word}.comment-actions{display:flex;gap:16px}.comment-action{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-dim);cursor:pointer;background:none;border:none;font-family:var(--font-body);transition:color .3s}.comment-action:hover{color:var(--cyan)}.comment-action.liked{color:var(--pink)}.reply-box{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.04)}.reply-item{padding:8px 12px;margin-top:6px;border-radius:8px;background:rgba(255,255,255,.02);font-size:13px}.reply-input-row{display:flex;gap:6px;margin-top:8px}.reply-input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);color:var(--text);font-size:13px;outline:none;font-family:var(--font-body)}.reply-send{padding:8px 16px;border-radius:8px;border:none;background:var(--cyan);color:var(--bg-deep);font-size:12px;font-weight:700;cursor:pointer}
/* LEADERBOARD */
.lb-list{max-width:600px;margin:0 auto}.lb-item{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--radius);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);margin-bottom:8px}.lb-pos{font-family:var(--font-display);font-size:18px;font-weight:900;width:36px;text-align:center;flex-shrink:0}.lb-pos-1{color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,.5)}.lb-pos-2{color:#c0c0c0;text-shadow:0 0 10px rgba(192,192,192,.4)}.lb-pos-3{color:#cd7f32;text-shadow:0 0 10px rgba(205,127,50,.4)}.lb-info{flex:1;min-width:0}.lb-nick{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}.lb-title-badge{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:700}.lb-fires{font-size:14px;letter-spacing:2px}.lb-fires-1{filter:hue-rotate(0deg) brightness(1.3)}.lb-fires-2{filter:hue-rotate(20deg) brightness(1.1)}.lb-fires-3{filter:hue-rotate(40deg) brightness(.95)}.lb-score{font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--cyan);flex-shrink:0}.lb-detail{font-size:11px;color:var(--text-dim);margin-top:2px}
/* PAYMENT */
.pay-container{max-width:520px;margin:0 auto}.wallet-status{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;padding:12px 18px;border-radius:var(--radius);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);font-family:var(--font-mono);font-size:13px}.wallet-dot{width:10px;height:10px;border-radius:50%}.wallet-dot.connected{background:#00ff88;box-shadow:0 0 8px rgba(0,255,136,.5)}.wallet-dot.disconnected{background:#ff4444}.connect-wallet-btn{display:block;width:100%;padding:14px;border-radius:var(--radius);border:none;font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:2px;color:#fff;cursor:pointer;margin-bottom:20px;background:linear-gradient(135deg,#f6851b,#e2761b);transition:all .35s}.connect-wallet-btn:hover{transform:translateY(-2px)}.connect-wallet-btn:disabled{opacity:.4;pointer-events:none}.pay-card{padding:24px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);margin-bottom:20px}.pay-card-title{font-weight:700;font-size:14px;margin-bottom:14px;color:var(--cyan)}.pay-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}.pay-row:last-child{border-bottom:none}.pay-row .label{color:var(--text-dim)}.pay-row .value{font-family:var(--font-mono);font-weight:700}.pay-row .value.addr{font-size:10px;color:var(--purple)}.pay-amount-input{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text);font-family:var(--font-mono);font-size:15px;font-weight:700;outline:none;margin-bottom:6px}.pay-hint{font-size:11px;color:var(--text-dim);margin-bottom:16px}.pay-btn{display:block;width:100%;padding:14px;border-radius:var(--radius);border:none;font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:2px;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--cyan),var(--purple));box-shadow:var(--glow-cyan);transition:all .35s}.pay-btn:hover{transform:translateY(-2px)}.pay-btn:disabled{opacity:.3;pointer-events:none}.pay-btn.loading{color:transparent;position:relative}.pay-btn.loading::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}.tx-result{margin-top:16px;padding:14px;border-radius:var(--radius);font-size:12px;font-family:var(--font-mono);word-break:break-all;animation:fadeUp .4s}.tx-result.pending{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);color:var(--gold)}.tx-result.confirmed{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2);color:#00ff88}.tx-result.failed{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.2);color:#ff6b6b}.tx-result a{color:inherit}.network-selector{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}.network-opt{padding:7px 14px;border-radius:100px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--text-dim);font-size:11px;font-weight:700;cursor:pointer;transition:all .3s;font-family:var(--font-body)}.network-opt.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,240,255,.08)}
/* FOLLOW */
.follow-hero{text-align:center;padding:32px 16px}.follow-avatar{width:110px;height:110px;border-radius:50%;margin:0 auto 20px;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,240,255,.2)}.follow-avatar img{width:100%;height:100%;object-fit:cover}.follow-avatar::after{content:'';position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(var(--cyan),var(--purple),var(--pink),var(--cyan));z-index:-1;animation:cardSpin 4s linear infinite}@keyframes cardSpin{to{transform:rotate(360deg)}}.follow-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 36px;border-radius:100px;border:none;font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:2px;color:#fff;cursor:pointer;text-decoration:none;background:linear-gradient(135deg,#1da1f2,var(--cyan));box-shadow:0 4px 30px rgba(29,161,242,.3);transition:all .35s}.follow-btn:hover{transform:translateY(-3px) scale(1.03)}.follow-btn svg{width:18px;height:18px;fill:currentColor}.follow-stats{display:flex;justify-content:center;gap:32px;margin-top:32px}.follow-stat{text-align:center}.follow-stat-val{font-family:var(--font-display);font-size:22px;font-weight:900;color:var(--cyan)}.follow-stat-label{font-size:11px;color:var(--text-dim);margin-top:4px}
/* PROFILE */

async function cloudSaveUser(uid){
  if(!_fbReady||!_fbDb)return;

async function cloudLoadUser(email){
  if(!_fbReady||!_fbDb)return null;
  try{
    const doc=await _fbDb.collection('users').doc(_emailKey(email)).get();
    if(!doc.exists)return null;
    return doc.data();
  }catch(e){console.warn('Cloud load user failed:',e);return null}

async function cloudVerifyAuth(email,pwd){
  if(!_fbReady||!_fbDb)return false;
  try{
    const doc=await _fbDb.collection('auth').doc(_emailKey(email)).get();
    if(!doc.exists)return false;
    const d=doc.data();
    const h=await sha256(pwd);
    return d.hash===h;
  }catch(e){return false}
}

async function cloudSyncComments(){
  if(!_fbReady||!_fbDb)return;
  try{
    const cloudComments=await cloudLoadComments();
    if(cloudComments.length===0)return;
    const localIdMap=new Map();
    db.comments.forEach((c,i)=>localIdMap.set(c.id,i));
    cloudComments.forEach(cc=>{
      if(localIdMap.has(cc.id)){
        const idx=localIdMap.get(cc.id);
        const local=db.comments[idx];
        /* If cloud has higher engagement, use cloud counts */
        if((cc.likesCount||0)>local.likes.length){local._cloudLikesCount=cc.likesCount}
        if((cc.repliesCount||0)>local.replies.length){local._cloudRepliesCount=cc.repliesCount}
        /* Merge real user likes from cloud */
        (cc.likes||[]).filter(l=>!_isBotId(l)).forEach(l=>{if(!local.likes.includes(l))local.likes.push(l)});
        /* Merge real user replies from cloud */
        const existKeys=new Set(local.replies.map(r=>r.uid+'_'+r.time));
        (cc.replies||[]).filter(r=>!_isBotId(r.uid)).forEach(r=>{if(!existKeys.has(r.uid+'_'+r.time))local.replies.push(r)});
      }else{
        /* New comment from cloud - not in local at all */
        const nc={...cc};
        nc._cloudLikesCount=cc.likesCount||cc.likes?.length||0;
        nc._cloudRepliesCount=cc.repliesCount||cc.replies?.length||0;
        if(!nc.likes)nc.likes=cc.likes||[];
        if(!nc.replies)nc.replies=cc.replies||[];
        db.comments.push(nc);
      }
    });
    /* Load user profiles for unknown comment authors */
    const allUids=[...new Set(db.comments.filter(c=>!_isBotId(c.uid)).map(c=>c.uid))];
    await ensureCloudUsers(allUids);
    localStorage.setItem('ck_db',JSON.stringify(db));
  }catch(e){console.warn('Cloud sync comments failed:',e)}
}
/* --- Bounty operations --- */
async function cloudSaveBounty(bounty){
  if(!_fbReady||!_fbDb||!bounty)return;
  try{
    await _fbDb.collection('bounties').doc(bounty.id).set(bounty);
  }catch(e){console.warn('Cloud save bounty failed:',e)}
}
async function cloudLoadBounties(){
  if(!_fbReady||!_fbDb)return[];
  try{
    const snap=await _fbDb.collection('bounties').get();
    const out=[];snap.forEach(doc=>out.push(doc.data()));
    return out;
  }catch(e){console.warn('Cloud load bounties failed:',e);return[]}
}
/* Refresh bounties from cloud and merge into local db */
async function cloudSyncBounties(){
  if(!_fbReady||!_fbDb)return;
  try{
    const cloudBounties=await cloudLoadBounties();
    if(cloudBounties.length>0){
      cloudBounties.forEach(cb=>{
        const idx=db.bounties.findIndex(b=>b.id===cb.id);
        if(idx>=0){
          /* Cloud is authoritative for completedBy and spent */
          db.bounties[idx].completedBy=cb.completedBy||[];
          db.bounties[idx].spent=cb.spent||0;
          db.bounties[idx].active=cb.active!==undefined?cb.active:true;
        }else{
          db.bounties.push(cb);
        }
      });
    }
    /* Ensure all local bounties exist in cloud */
    for(const b of db.bounties){
      const exists=cloudBounties.some(cb=>cb.id===b.id);
      if(!exists){await cloudSaveBounty(b)}
    }
    localStorage.setItem('ck_db',JSON.stringify(db));
  }catch(e){console.warn('Cloud sync bounties failed:',e)}
}
async function cloudClaimBounty(bid,uid,reward){
  if(!_fbReady||!_fbDb)return false;
  try{
    const ref=_fbDb.collection('bounties').doc(bid);
    return _fbDb.runTransaction(async tx=>{
      const doc=await tx.get(ref);
      if(!doc.exists)throw 'not found';
      const d=doc.data();
      if(d.completedBy&&d.completedBy.includes(uid))throw 'already done';
      const requiredPeople=Math.floor((d.budget||0)/(d.reward||0.1));
      const currentPeople=d.completedBy?d.completedBy.length:0;
      if(currentPeople>=requiredPeople)throw 'exhausted';
      tx.update(ref,{
        spent:+((d.spent||0)+reward).toFixed(1),
        completedBy:firebase.firestore.FieldValue.arrayUnion(uid)
      });
      return true;
    });
  }catch(e){console.warn('Cloud claim bounty failed:',e);return false}
}
/* --- Counter operations --- */
async function cloudGetNextId(field){
  if(!_fbReady||!_fbDb)return null;
  try{
    const ref=_fbDb.collection('counters').doc('global');
    return _fbDb.runTransaction(async tx=>{
      const doc=await tx.get(ref);
      let val=field==='nextCid'?2000:100;
      if(doc.exists){const d=doc.data();val=d[field]||val}
      tx.set(ref,{[field]:val+1},{merge:true});
      return val;
    });
  }catch(e){console.warn('Cloud counter failed:',e);return null}
}

async function cloudSyncAll(){

    game.enemies.push({x:side?810:-30,y:GY-36,w:22,h:36,hp:3,dir:side?-1:1,speed:1.2*lv.speed,shootCD:~~(Math.random()*60)+40,frame:0,type:'soldier'});

function autoEngage(comment){
  const posterIsVip=isVipPost(comment.uid);
  /* VIP: 3000-30000 likes, 1000-10000 replies */
  /* Non-VIP: 40-2000 likes, 30-1879 replies */
  const totalLikes=posterIsVip?~~(Math.random()*27001)+3000:~~(Math.random()*1961)+40;
  const totalReplies=posterIsVip?~~(Math.random()*9001)+1000:~~(Math.random()*1850)+30;
  const shuffled=[];for(let i=0;i<totalLikes;i++){shuffled.push(SEED_USERS[i%SEED_USERS.length].id)}
  const txt=comment.text;
  const ctx=getContextReplies(txt);
  const replyBots=[];
  for(let i=0;i<totalReplies;i++){replyBots.push(SEED_USERS[~~(Math.random()*SEED_USERS.length)])}
  let likeIdx=0,replyIdx=0;
  const likesPerTick=posterIsVip?~~(Math.random()*501)+500:~~(Math.random()*51)+30;
  const repliesPerTick=posterIsVip?~~(Math.random()*101)+50:~~(Math.random()*11)+5;
  function tick(){
    let changed=false;
    const le=Math.min(likeIdx+likesPerTick,totalLikes);
    for(;likeIdx<le;likeIdx++){comment.likes.push(shuffled[likeIdx]);changed=true}
    const re=Math.min(replyIdx+repliesPerTick,totalReplies);
    for(;replyIdx<re;replyIdx++){
      const bot=replyBots[replyIdx];
      comment.replies.push({uid:bot.id,text:ctx[replyIdx%ctx.length],time:Date.now()});
      changed=true;
    }
    if(changed){saveDB();_renderCommentsUI()}
    const likeDone=likeIdx>=totalLikes,replyDone=replyIdx>=totalReplies;
    if(likeDone&&replyDone){
      clearInterval(timer);
      /* Save full engagement to cloud after autoEngage completes */
      cloudSaveCommentFull(comment);
    }
  }
  tick();
  const timer=setInterval(tick,800);
}

function createBounty(){
  if(!requireLogin()||!checkVip(me())){showToast(t('bounty_need_vip'),'error');return}
  const target=document.getElementById('bountyTarget').value.trim();
  const text=document.getElementById('bountyText').value.trim();
  const budget=+document.getElementById('bountyBudget').value;
  if(!target||!text||!budget||budget<1){showToast(t('bounty_fill'),'error');return}
  if(me().balance<budget){showToast(t('insufficient_balance'),'error');return}
  me().balance-=budget;
  const url=target.startsWith('http')?target:`https://x.com/${target.replace('@','')}`;
  const name=target.replace('@','');
  if(!db.bounties)db.bounties=[];
  if(!db.nextBid)db.nextBid=100;
  const bounty={id:'bty'+(db.nextBid++),uid:currentUser,type:'follow',targetUrl:url,targetName:name,reward:0.1,budget,spent:0,completedBy:[],text,time:Date.now(),active:true};
  db.bounties.push(bounty);
  cloudSaveBounty(bounty);if(_fbReady){cloudGetNextId('nextBid');cloudSaveUser(currentUser)}
  saveDB();updateHeader();renderBounty();showToast(t('bounty_published'),'success');
}
function doBounty(bid){
  if(!requireLogin())return;
  const b=(db.bounties||[]).find(x=>x.id===bid);
  if(!b)return;
  if(b.completedBy&&b.completedBy.includes(currentUser)){showToast(t('bounty_completed'),'info');return}
  const requiredPeople=Math.floor(b.budget/b.reward);
  const currentPeople=b.completedBy?b.completedBy.length:0;
  if(currentPeople>=requiredPeople){showToast(t('bounty_activity_ended'),'error');return}
  window.open(b.targetUrl,'_blank');
  setTimeout(()=>{
    if(confirm(t('bounty_confirm'))){
      if(!b.completedBy)b.completedBy=[];
      /* Local claim + sync to cloud */
      function doLocalClaim(){
        if(b.completedBy.includes(currentUser))return; /* prevent duplicate */
        b.completedBy.push(currentUser);
        b.spent=+(b.spent+b.reward).toFixed(1);
        me().balance=+(me().balance+b.reward).toFixed(1);
        saveDB();updateHeader();_renderBountyUI();
        showToast(`+${b.reward}$ ${t('bounty_reward')}`,'success');
        /* Always sync the full bounty to cloud after local claim */
        if(_fbReady){cloudSaveBounty(b);cloudSaveUser(currentUser)}
      }
      if(_fbReady){
        /* First ensure the bounty doc exists in cloud */
        cloudSaveBounty(b).then(()=>{
          return cloudClaimBounty(bid,currentUser,b.reward);
        }).then(ok=>{
          if(ok){doLocalClaim()}
          else{
            /* Transaction failed but doc exists, try direct local + save */
            doLocalClaim();
          }
        }).catch(e=>{
          if(e==='already done')showToast(t('bounty_completed'),'info');
          else if(e==='exhausted')showToast(t('bounty_activity_ended'),'error');
          else{doLocalClaim()}
        });
      }else{
        doLocalClaim();
      }
    }
  },2000);
}
const VIP_TIERS=[{label_zh:'月度会员',label_en:'Monthly',price:19.9,days:30,desc_zh:'1个月',desc_en:'1 Month'},{label_zh:'季度会员',label_en:'Quarterly',price:29.9,days:120,desc_zh:'4个月',desc_en:'4 Months'},{label_zh:'年度会员',label_en:'Yearly',price:59.9,days:730,desc_zh:'2年',desc_en:'2 Years'}];
function showVipModal(){
  if(!requireLogin())return;
  const u=me();
  if(checkVip(u)){showToast(t('vip_already')+' · '+vipTimeLeft(u),'info');return}
  let m=document.getElementById('vipModal');
  if(m){m.remove()}
  m=document.createElement('div');m.id='vipModal';
  m.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(8px)';
  let h='<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;max-width:520px;width:90%;position:relative">';
  h+='<div style="position:absolute;top:12px;right:16px;cursor:pointer;font-size:20px;color:var(--text-dim)" onclick="document.getElementById(\'vipModal\').remove()">✕</div>';
  h+='<div style="text-align:center;margin-bottom:24px"><div style="font-size:22px;font-weight:900;color:var(--gold);margin-bottom:6px">'+t('vip_modal_title')+'</div><div style="font-size:13px;color:var(--text-dim)">'+t('vip_modal_desc')+'</div></div>';
  h+='<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">';
  VIP_TIERS.forEach((ti,i)=>{
    const pop=i===1?' border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,.15)':'';
    const tLabel=currentLang==='en'?ti.label_en:ti.label_zh;
    const tDesc=currentLang==='en'?ti.desc_en:ti.desc_zh;
    h+=`<div style="flex:1;min-width:140px;padding:20px 16px;border-radius:var(--radius);border:1px solid var(--border);background:rgba(255,215,0,.02);text-align:center;cursor:pointer;transition:all .2s;${pop}" onmouseover="this.style.borderColor='var(--gold)';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='${i===1?'var(--gold)':'var(--border)'}';this.style.transform=''">`;
    if(i===1)h+='<div style="font-size:10px;color:var(--gold);margin-bottom:6px;font-weight:700">'+t('vip_recommend')+'</div>';
    h+=`<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px">${tLabel}</div>`;
    h+=`<div style="font-size:28px;font-weight:900;color:var(--gold);margin-bottom:4px">${ti.price}<span style="font-size:14px">$</span></div>`;
    h+=`<div style="font-size:12px;color:var(--text-dim);margin-bottom:14px">${tDesc}</div>`;
    h+=`<button class="open-vip-btn" style="width:100%;padding:8px 0;font-size:13px" onclick="activateVip(${i})">${t('vip_activate')}</button>`;
    h+=`</div>`;
  });
  h+='</div><div style="margin-top:16px;text-align:center;font-size:12px;color:var(--text-dim)">'+t('balance_label')+': '+me().balance+'$</div></div>';
  m.innerHTML=h;
  m.addEventListener('click',e=>{if(e.target===m)m.remove()});
  document.body.appendChild(m);
}
function activateVip(tierIdx){
  if(!requireLogin())return;
  const u=me(),ti=VIP_TIERS[tierIdx];
  if(!ti)return;
  const tLabel=currentLang==='en'?ti.label_en:ti.label_zh;
  const tDesc=currentLang==='en'?ti.desc_en:ti.desc_zh;
  if(checkVip(u)){showToast(t('vip_already'),'info');document.getElementById('vipModal')?.remove();return}
  if(u.balance<ti.price){showToast(t('insufficient')+', '+t('need')+ti.price+'$','error');return}
  if(!confirm(t('vip_confirm')+' '+tLabel+'? '+t('vip_deduct')+' '+ti.price+'$'))return;
  u.balance=+(u.balance-ti.price).toFixed(1);
  u.vip=true;
  u.vipExpiry=Date.now()+ti.days*86400000;
  saveDB();updateHeader();renderProfile();renderBounty();
  document.getElementById('vipModal')?.remove();
  showToast(t('vip_success')+' '+tDesc+' '+t('vip_activated'),'success');
}
